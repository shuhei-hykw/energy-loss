# Geant4 table-generation job: produce a stopping-power / CSDA-range
# table for a single (particle, material) combination by running the
# in-tree C++ generator. The Python side reads the resulting CSV with
# RangeEnergyTable.from_nist_csv() — the same parser used for the
# NIST PSTAR/ASTAR tables.
#
# Generated tables land in energy_loss/data/geant4/ keyed by a hash of
# the (particle, material, energies, grid) tuple so repeat runs reuse
# the previous CSV.

geant4_table:
  particle: proton
  material: nuclear_emulsion
  emin_mev: 0.01
  emax_mev: 1000.0
  n_points: 200
  grid: log
  # physics_list: one of {option4, atima}.
  #  - option4 (default): G4EmStandardPhysics_option4, aligned with
  #    NIST PSTAR / ASTAR (ICRU 49 / 73).
  #  - atima : G4AtimaEnergyLossModel + G4AtimaFluctuations, the
  #    in-Geant4 ATIMA-based model. Designed for low-energy heavy
  #    charged particles and differs from PSTAR / option4 noticeably
  #    in the emulsion regime (see examples/plot_comparison.py).
  physics_list: option4
